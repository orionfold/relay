name: Relay Host contract

on:
  pull_request:
    paths:
      - ".github/workflows/relay-host-contract.yml"
      - ".dockerignore"
      - "Dockerfile.relay-host"
      - "config/install-dependency-debt.json"
      - "next.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "scripts/**relay-host*"
      - "scripts/check-install-dependency-debt.mjs"
      - "src/app/api/health/**"
      - "src/instrumentation-node.ts"
      - "src/lib/host/**"
      - "src/lib/snapshots/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm
      - run: npm ci
      - run: npm run check:install-debt
      - run: npm run test:relay-host
      - name: Verify standalone Linux build and native modules
        run: |
          docker buildx build --provenance=false --load --tag relay-host:contract --file Dockerfile.relay-host .
          docker run --rm --entrypoint node relay-host:contract -e "require('better-sqlite3'); require('pdf-parse'); process.stdout.write('native-artifact-ok')"
