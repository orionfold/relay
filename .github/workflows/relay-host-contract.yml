name: Relay Host contract

on:
  pull_request:
    paths:
      - ".github/workflows/relay-host-contract.yml"
      - ".dockerignore"
      - "Dockerfile.relay-host"
      - "config/install-dependency-debt.json"
      - "config/relay-host-artifact-policy.json"
      - "next.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "scripts/**relay-host*"
      - "scripts/check-install-dependency-debt.mjs"
      - "src/**"
      - "public/**"
      - "knowledge/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - run: npm run check:install-debt
      - run: npm run test:relay-host
      - name: Build, audit, reproduce and conformance-test the Host artifact
        run: npm run host:artifact:build
