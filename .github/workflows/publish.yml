name: Publish to npm

# Publishes orionfold-relay to npm via npm Trusted Publishing (OIDC).
# No tokens, no 2FA prompts: GitHub Actions presents a signed OIDC identity
# that npm trusts (bound to this repo + this workflow file in the package's
# Trusted Publisher settings). Provenance attestation is generated automatically.
#
# Release flow (from a clean main):
#   npm version patch   # bumps package.json + creates a vX.Y.Z tag + commit
#   git push --follow-tags
# The tag push triggers this workflow, which builds, tests, and publishes.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # REQUIRED: lets the runner mint the OIDC token npm verifies
      contents: write # lets the final step create a GitHub Release from CHANGELOG
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "22" # Trusted publishing needs Node >= 22.14.0
          registry-url: "https://registry.npmjs.org"

      # npm >= 11.5.1 is required for OIDC trusted publishing. The Node 22 image
      # ships an older npm, so pin a known-good version explicitly.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Guard — tag version matches package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing orionfold-relay@$PKG"

      - name: Build + test gate
        run: |
          npm run build:cli
          npx vitest run src/lib/licensing/ src/lib/desktop/

      # npx users must never receive a multi-hundred-MB tarball: the production
      # build ships as a GitHub Release asset (below), not inside the package.
      - name: Guard — npm tarball stays small (< 10 MB)
        run: |
          # npm can print warnings (e.g. `npm warn Unknown user config ...`) to
          # STDOUT ahead of the --json payload, which crashed a naive
          # `JSON.parse(stdin)[0].size` and failed the whole publish on a false
          # positive. Capture the output and extract only the JSON array (the
          # first `[` onward), so a leading warn line can never break parsing.
          npm pack --dry-run --json > pack.out 2>pack.err || { cat pack.err; exit 1; }
          SIZE=$(node -e '
            const s = require("fs").readFileSync("pack.out", "utf8");
            // npm --json prints the array on its own line; anchor on a line that
            // STARTS with "[" so a warn line containing a bracket cannot fool us.
            const start = s.search(/^\s*\[/m);
            const src = start >= 0 ? s.slice(start) : s;
            let info;
            try { info = JSON.parse(src)[0]; }
            catch (e) { console.error("could not parse npm pack --json output:\n" + s); process.exit(1); }
            process.stdout.write(String(info.size));
          ')
          echo "npm tarball size: $SIZE bytes"
          if [ -z "$SIZE" ] || ! [ "$SIZE" -eq "$SIZE" ] 2>/dev/null; then
            echo "::error::could not determine npm tarball size (parsed '$SIZE')"
            exit 1
          fi
          if [ "$SIZE" -gt 10485760 ]; then
            echo "::error::npm tarball is $SIZE bytes (> 10 MB) — build output is leaking into the package"
            exit 1
          fi

      # Supply-chain disclosure: a CycloneDX SBOM of the production dependency
      # tree ships as a GitHub Release asset for every version, so evaluators
      # can audit what `npm install orionfold-relay` pulls without installing
      # it. Generated from the same lockfile this publish runs against. The
      # node -e parse is a guard: `npm sbom` writing a warning into stdout
      # would otherwise ship a corrupt asset silently.
      - name: Generate CycloneDX SBOM
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          npm sbom --sbom-format cyclonedx --omit dev > "orionfold-relay-$VERSION.sbom.cdx.json"
          node -e "JSON.parse(require('fs').readFileSync('orionfold-relay-$VERSION.sbom.cdx.json','utf8'))"
          echo "SBOM generated: orionfold-relay-$VERSION.sbom.cdx.json"

      # Production build artifact (#10): npx installs download this from the
      # GitHub Release on first run and launch `next start` instead of `next dev`.
      - name: Build production .next artifact
        run: |
          npm run build
          node scripts/build-prebuilt-artifact.mjs

      # Full customer simulation BEFORE publishing: pack tarball → clean-dir
      # install → first-run artifact download (file://) → `next start` smoke,
      # plus the LAN cross-origin and loud-fallback cases. A failure here means
      # customers would get a broken release — so it gates npm publish.
      - name: npx production smoke
        run: node scripts/npx-prod-smoke.mjs

      # No NODE_AUTH_TOKEN / secret needed — OIDC is auto-detected. npm generates
      # provenance automatically when publishing via trusted publishing.
      - name: Publish
        run: npm publish

      # Publish a customer-facing GitHub Release from the matching CHANGELOG
      # section, so every npm release has human-readable notes without a manual
      # `gh release create`. Notes come from CHANGELOG.md (a committed, trusted
      # file) — no untrusted event input is interpolated into the shell.
      - name: Create GitHub Release from CHANGELOG
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${TAG#v}"
          NOTES_FILE="$(mktemp)"
          # Extract the section between "## [VERSION]" and the next "## " header.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { grab=1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "No CHANGELOG.md section for [$VERSION]; using a generic note."
            printf 'Release %s. See CHANGELOG.md for details.\n' "$VERSION" > "$NOTES_FILE"
          fi
          # Create the release if it doesn't already exist (idempotent on re-run).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --verify-tag
          fi

      # Attach the production build (+ checksum) the CLI downloads on first
      # run. --clobber keeps re-runs idempotent. If this step fails, installs
      # of this version fall back to dev mode loudly — re-run the workflow or
      # upload the assets manually rather than leaving the release bare.
      - name: Upload production build to the GitHub Release
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${TAG#v}"
          gh release upload "$TAG" \
            "dist-artifacts/relay-next-build-$VERSION.tgz" \
            "dist-artifacts/relay-next-build-$VERSION.tgz.sha256" \
            "orionfold-relay-$VERSION.sbom.cdx.json" \
            --clobber
