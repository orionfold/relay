name: Fresh-clone development setup

on:
  workflow_call:
    inputs:
      receipt_scope:
        description: Optional release-candidate scope that enables lane receipts
        required: false
        default: ""
        type: string
      source_sha:
        description: Exact source SHA for release-candidate evidence
        required: false
        default: ""
        type: string
      version:
        description: Candidate Relay version
        required: false
        default: ""
        type: string
  pull_request:
    paths:
      - ".codex/hooks/**"
      - ".codex/hooks.json"
      - ".github/workflows/fresh-clone-dev.yml"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "scripts/fresh-clone-dev-smoke.mjs"
      - "scripts/release-preflight.mjs"
      - "scripts/lib/release-preflight.mjs"
      - "src/components/settings/ollama-section.tsx"
      - "src/components/settings/__tests__/ollama-section.test.tsx"
      - "src/lib/instance/**"
  push:
    branches: [main]
    paths:
      - ".codex/hooks/**"
      - ".codex/hooks.json"
      - ".github/workflows/fresh-clone-dev.yml"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "scripts/fresh-clone-dev-smoke.mjs"
      - "scripts/release-preflight.mjs"
      - "scripts/lib/release-preflight.mjs"
      - "src/components/settings/ollama-section.tsx"
      - "src/components/settings/__tests__/ollama-section.test.tsx"
      - "src/lib/instance/**"
  workflow_dispatch:

jobs:
  fresh-clone:
    name: ${{ matrix.os }} · Node ${{ matrix.node }} · npm ${{ matrix.npm }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            node: "22.23.1"
            npm: "11.6.0"
            lane: macos-node22-npm11
          - os: macos-latest
            node: "24.15.0"
            npm: "12.0.1"
            lane: macos-node24-npm12
          - os: windows-latest
            node: "22.23.1"
            npm: "11.6.0"
            lane: windows-node22-npm11
          - os: windows-latest
            node: "24.15.0"
            npm: "12.0.1"
            lane: windows-node24-npm12
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ inputs.source_sha || github.sha }}
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Select supported npm line
        run: npm install --global npm@${{ matrix.npm }}

      - name: Install dependencies
        run: npm ci

      - name: Replay README setup (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cat > .env.local <<'EOF'
          RELAY_DEV_MODE=true
          RELAY_DATA_DIR=./.relay-dev-data
          EOF
          touch .git/relay-dev-mode

      - name: Replay README setup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @'
          RELAY_DEV_MODE=true
          RELAY_DATA_DIR=./.relay-dev-data
          '@ | Set-Content .env.local
          New-Item -ItemType File .git/relay-dev-mode -Force | Out-Null

      - name: Verify portable hook and setup regressions
        run: |
          npm run test:hooks
          npx vitest run src/lib/instance/__tests__/bootstrap.test.ts src/components/dashboard/__tests__/welcome-landing.test.tsx src/components/settings/__tests__/providers-runtimes-section.test.tsx src/components/settings/__tests__/ollama-section.test.tsx

      - name: Boot literal fresh clone
        run: node scripts/fresh-clone-dev-smoke.mjs

      - name: Record terminal release-candidate lane evidence
        if: ${{ always() && inputs.receipt_scope != '' }}
        shell: bash
        run: |
          STATUS="${{ job.status }}"
          node scripts/release-preflight.mjs lane \
            --id "${{ matrix.lane }}" \
            --status "$STATUS" \
            --out "output/release-preflight/lanes/${{ matrix.lane }}.json"

      - name: Retain release-candidate lane evidence
        if: ${{ always() && inputs.receipt_scope != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-preflight-lane-${{ inputs.receipt_scope }}-${{ matrix.lane }}
          path: output/release-preflight/lanes/${{ matrix.lane }}.json
          if-no-files-found: error
          overwrite: true
          retention-days: 7
