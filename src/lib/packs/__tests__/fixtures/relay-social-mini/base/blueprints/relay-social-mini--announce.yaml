id: relay-social-mini--announce
name: Announce Lead
description: Test-only — announce a new lead on social.
version: "1.0.0"
domain: work
tags: [social]
pattern: sequence
author: Orionfold
variables:
  # Row-insert trigger (on the CRM child's `leads` table): auto-fills from the
  # row, no human prompt — mirrors the shipped convention (fix-row-insert-...).
  - id: lead
    type: text
    label: Lead
    required: false
    default: "{{row.name}}"
steps:
  - name: Draft announcement
    profileId: relay-social-mini--writer
    promptTemplate: "Draft a social post announcing {{lead}}."
    requiresApproval: false
