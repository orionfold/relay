id: relay-web-assets--asset-curator
name: Web Asset Curator
version: "1.0.0"
domain: work
tags: [web, design, assets, gallery]
supportedRuntimes: [claude-code, anthropic-direct, openai-direct, ollama]
preferredRuntime: anthropic-direct
allowedTools:
  - Read
  - Grep
  - Glob
  - WebSearch
  - WebFetch
  - Write
canUseToolPolicy:
  autoApprove: [Read, Grep, Glob]
  autoDeny: [Bash]
maxTurns: 20
author: Orionfold
