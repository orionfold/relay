id: relay-cre--lease-abstraction
name: Lease Abstraction Pipeline
description: >
  Ingest commercial lease documents, abstract key clauses, verify the abstraction
  against source, and deliver a client-ready lease-abstract package with a
  consolidated rent roll. Two human checkpoints guard accuracy before delivery.
version: "1.0.0"
domain: work
tags: [cre, lease-abstraction, rent-roll, due-diligence]
pattern: checkpoint
difficulty: intermediate
estimatedDuration: "30-60 min"
author: Orionfold
variables:
  - id: client
    type: text
    label: Client
    description: The CRE client whose leases are being abstracted
    required: true
    placeholder: Meridian Commercial Realty
  - id: portfolio
    type: textarea
    label: Portfolio / property scope
    description: Which properties or leases this run covers
    required: false
steps:
  - name: Ingest lease documents
    profileId: relay-cre--cre-analyst
    requiresApproval: false
    promptTemplate: >
      Read the uploaded commercial lease documents for {{client}} ({{portfolio}}).
      For each lease, extract tenant legal name, premises/suite, rentable square
      feet (RSF), commencement and expiration dates, the base rent schedule, and
      the renewal/option structure. Output a structured rent-roll table.
    expectedOutput: A structured rent-roll table with one row per lease.
  - name: Abstract key clauses
    profileId: relay-cre--cre-analyst
    requiresApproval: true
    promptTemplate: >
      Abstract the critical clauses from each lease: rent escalations (fixed step
      vs. CPI), CAM / operating-expense recovery, tenant-improvement allowance,
      early-termination, co-tenancy, and exclusive-use. Flag any term that is
      non-standard or landlord-unfavorable.
    expectedOutput: Per-lease clause abstract with flagged non-standard terms.
  - name: Verify abstraction against source
    profileId: relay-cre--cre-analyst
    requiresApproval: true
    promptTemplate: >
      Cross-check every abstracted field against the source lease text. Flag any
      field below ~90% confidence for human review and produce a confidence-scored
      exception list.
    expectedOutput: A confidence-scored exception list of fields needing review.
  - name: Deliver lease abstract package
    profileId: relay-cre--cre-analyst
    requiresApproval: false
    promptTemplate: >
      Compile the per-lease abstracts and the consolidated rent roll into a
      client-ready package for {{client}}, with a one-page portfolio summary
      (total RSF, WALT, and the next-12-months expirations).
    expectedOutput: A client-ready lease-abstract package with portfolio summary.
