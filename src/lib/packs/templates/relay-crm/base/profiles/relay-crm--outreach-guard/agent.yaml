id: relay-crm--outreach-guard
name: Outreach Guard
version: "1.0.0"
domain: work
tags: [crm, leads, outreach, compliance, can-spam, gdpr, cadence]
supportedRuntimes: [claude-code, anthropic-direct, openai-direct, ollama]
preferredRuntime: anthropic-direct
allowedTools:
  - Read
  - Grep
  - Glob
canUseToolPolicy:
