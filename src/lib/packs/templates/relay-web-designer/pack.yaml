id: relay-web-designer
version: "0.1.0"
name: Relay Web Designer
author: Orionfold
description: >
  A web-design operating surface in one app: manage reusable web assets, compose
  ordered landing-page sections, generate a local static-site preview, and
  publish the exact approved artifact to a user-owned GitHub Pages target. One
  install, one app. Everything stays local until you explicitly publish. Relay
  never sends your data to Orionfold.
relayCore: ">=0.35.0"
icon: briefcase
entitlement: product:orionfold-relay
price:
  intro: "$349/year"
  list: "$499/year"
  note: "One install for the Web Designer line — assets plus publisher composed. One license unlocks every paid Relay pack."
purchaseUrl: https://orionfold.com/relay/
related:
  text: "Prefer to compose it yourself? Install Relay Web Assets and Relay Web Publisher separately."
  href: "/packs?filter=premium"
changelog:
  "0.1.0": >-
    The first generator/publisher pack family: an asset gallery plus a
    static-site section publisher composed into one app, with local preview and
    GitHub Pages publishing through the TDR-039 substrate.
bundle:
  - relay-web-publisher
  - relay-web-assets
