id: relay-agency--client-onboarding
name: Client Onboarding Runbook
description: >
  Stand up a new client: select the profiles and blueprints for the engagement,
  configure budget guardrails (approval-gated), schedule recurring deliverables,
  and produce a one-page onboarding handoff.
version: "1.0.0"
domain: work
tags: [agency-ops, onboarding, runbook, guardrails]
pattern: planner-executor
difficulty: intermediate
estimatedDuration: "20-30 min"
author: Orionfold
variables:
  - id: client
    type: text
    label: New client
    required: true
  - id: engagement_type
    type: select
    label: Engagement type
    required: true
    options:
      - value: retainer
        label: Retainer
      - value: project
        label: Project
      - value: hybrid
        label: Hybrid
  - id: retainer
    type: text
    label: Retainer tier / monthly cap
    description: Illustrative budget guardrail (e.g. "$600/mo")
    required: false
steps:
  - name: Select profiles & blueprints
    profileId: relay-agency--onboarding-runner
    requiresApproval: false
    promptTemplate: >
      For {{client}} (engagement type: {{engagement_type}}), select which agent
      profiles to assign and which workflow blueprints to instantiate. Note the
      client-specific reference docs to gather (brand guide, chart of accounts,
      service calendar). If the client works a specific industry, note that its
      industry pack adds the delivery profiles and blueprints on top.
    expectedOutput: A profile + blueprint assignment plan with reference-doc list.
  - name: Configure budget guardrails
    profileId: relay-agency--onboarding-runner
    requiresApproval: true
    promptTemplate: >
      Set {{client}}'s monthly budget guardrail to the retainer tier ({{retainer}}),
      configure approval requirements for client-facing output, and define the
      delivery channel (email/Slack).
    expectedOutput: A guardrail + approval-policy + delivery-channel configuration.
  - name: Schedule recurring deliverables
    profileId: relay-agency--onboarding-runner
    requiresApproval: false
    promptTemplate: >
      Create the recurring schedules {{client}} needs (weekly report, monthly
      statement, deadline watch). Confirm cadence and active hours.
    expectedOutput: A set of recurring schedules with confirmed cadence.
  - name: Produce onboarding handoff
    profileId: relay-agency--onboarding-runner
    requiresApproval: false
    promptTemplate: >
      Produce a one-page onboarding handoff for {{client}}: the project, assigned
      profiles, instantiated blueprints, schedules, and guardrails — a repeatable
      checklist for the next client.
    expectedOutput: A one-page onboarding handoff document.
