id: relay-agency--intake-summary
name: Program Intake Summarization
description: >
  Summarize de-identified program-intake records, identify service trends across
  periods, and draft a funder update — never surfacing PII.
version: "1.0.0"
domain: work
tags: [nonprofit, intake, program-data, funder-update, privacy]
pattern: sequence
difficulty: beginner
estimatedDuration: "15-25 min"
author: Orionfold
variables:
  - id: client
    type: text
    label: Client
    required: true
    placeholder: Lakeshore Family Services
  - id: period
    type: text
    label: Reporting period
    required: false
    placeholder: Q1
steps:
  - name: Summarize intake records
    profileId: relay-agency--impact-writer
    requiresApproval: false
    promptTemplate: >
      Summarize {{client}}'s de-identified intake records for {{period}} into
      aggregate counts by program, referral source, and service need. Never
      surface PII.
    expectedOutput: Aggregate intake counts, fully de-identified.
  - name: Identify service trends
    profileId: relay-agency--impact-writer
    requiresApproval: false
    promptTemplate: >
      Compare this period against the prior two. Highlight rising demand, waitlist
      pressure, and dropped-off referral sources.
    expectedOutput: A service-trend analysis across three periods.
  - name: Draft funder update
    profileId: relay-agency--impact-writer
    requiresApproval: false
    promptTemplate: >
      Draft a short funder update: people served, notable trends, and one fully
      anonymized program story. Keep it factual and grant-aligned.
    expectedOutput: A short, anonymized, grant-aligned funder update.
