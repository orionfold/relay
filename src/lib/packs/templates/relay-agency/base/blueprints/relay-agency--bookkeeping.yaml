id: relay-agency--bookkeeping
name: Receipt to Bookkeeping Intake
description: >
  Capture a receipt or invoice, code and allocate it to a property, reconcile
  against budget, and stage a bookkeeping entry the property manager can approve
  in one click.
version: "1.0.0"
domain: work
tags: [bookkeeping, property-management, gl-coding, reconciliation]
pattern: sequence
difficulty: beginner
estimatedDuration: "5-10 min"
author: Orionfold
variables:
  - id: client
    type: text
    label: Client
    required: true
    placeholder: Parkview Property Management
  - id: document
    type: file
    label: Receipt / invoice
    description: The receipt or invoice image to process
    required: false
steps:
  - name: Capture receipt / invoice
    profileId: relay-agency--bookkeeper
    requiresApproval: false
    promptTemplate: >
      Process the uploaded receipt/invoice for {{client}}. Extract vendor, date,
      amount, tax, payment method, and line items. Normalize the vendor name
      against the known-vendor list.
    expectedOutput: A normalized, structured expense record.
  - name: Categorize & allocate to property
    profileId: relay-agency--bookkeeper
    requiresApproval: false
    promptTemplate: >
      Assign the GL category (repairs, utilities, management fee, capex, etc.) and
      allocate the expense to the correct property and unit. Flag any capital
      improvement for owner approval.
    expectedOutput: A GL-coded, property-allocated expense, capital items flagged.
  - name: Reconcile against budget
    profileId: relay-agency--bookkeeper
    requiresApproval: false
    promptTemplate: >
      Compare the expense against the property's monthly operating budget. Flag
      over-budget categories or unusual amounts.
    expectedOutput: A reconciliation note with any variances flagged.
  - name: Stage bookkeeping entry
    profileId: relay-agency--bookkeeper
    requiresApproval: true
    promptTemplate: >
      Stage the journal entry with all fields complete, and produce a daily intake
      summary for {{client}} that the property manager can approve in one click.
    expectedOutput: A staged journal entry plus a one-click-approvable intake summary.
