id: relay-agency--cre-listing
name: Listing & Market Analysis
description: >
  Intake property facts, research submarket comps, write the listing description,
  and assemble a broker-ready offering one-pager. Staged for broker review before
  client delivery.
version: "1.0.0"
domain: work
tags: [cre, listing, market-analysis, brokerage]
pattern: sequence
difficulty: intermediate
estimatedDuration: "20-40 min"
author: Orionfold
variables:
  - id: client
    type: text
    label: Client
    required: true
    placeholder: Summit CRE Advisors
  - id: property
    type: textarea
    label: Subject property
    description: Address, asset type, and the key listing facts
    required: true
steps:
  - name: Intake property facts
    profileId: relay-agency--cre-listing-writer
    requiresApproval: false
    promptTemplate: >
      Pull the listing facts for {{property}} (client {{client}}): address, asset
      type, building SF, lot size, year built, parking ratio, zoning, asking
      price/cap rate. Note any deferred maintenance or value-add story.
    expectedOutput: A complete property fact sheet.
  - name: Research comparable sales & leases
    profileId: relay-agency--cre-listing-writer
    requiresApproval: false
    promptTemplate: >
      Identify 5-7 comparable sales and leases in the same submarket within the
      last ~18 months. Capture price/SF, cap rate, lease rate, and concession
      trends, then summarize how the subject is positioned.
    expectedOutput: A comp set with a positioning summary.
  - name: Write listing description
    profileId: relay-agency--cre-listing-writer
    requiresApproval: false
    promptTemplate: >
      Write the listing: a headline, an investment-highlights bullet list, a
      location/submarket narrative, and a tenancy summary. Defensible claims only,
      no unsubstantiated projections.
    expectedOutput: Listing copy with headline and highlights.
  - name: Assemble marketing one-pager
    profileId: relay-agency--cre-listing-writer
    requiresApproval: true
    promptTemplate: >
      Assemble the offering one-pager: listing copy, a comp summary table, and a
      submarket snapshot (vacancy, absorption, rent trend). Stage it for broker
      review before client delivery.
    expectedOutput: A broker-ready offering one-pager.
