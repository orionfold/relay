# Relay Agency — client seed (domain-neutral persona pack).
# Read by installPack -> ensureCustomer (slug-idempotent: re-seeding never
# clobbers operator edits). 6 scrubbed-but-believable clients across engagement
# types, with NO vertical pinned — an industry pack tags its own clients. Tier /
# cap figures are ILLUSTRATIVE seed notes only — the pack records cost
# ATTRIBUTION via the ledger rollup, not billing POLICY.

- slug: northwind-studio
  name: Northwind Studio
  notes: >
    Flagship retainer client. Steady monthly scope with occasional project work;
    the account you build the operating rhythm around.
    Illustrative retainer tier: ~$1,200/mo guardrail cap.

- slug: harbor-consulting
  name: Harbor Consulting
  notes: >
    Retainer client on a predictable monthly cadence. Clean intake, low variance,
    a good reference account.
    Illustrative retainer tier: ~$800/mo guardrail cap.

- slug: beacon-collective
  name: Beacon Collective
  notes: >
    Hybrid engagement — a base retainer plus project spikes. Margin swings with
    project mix, so it is one to watch on the cockpit.
    Illustrative retainer tier: ~$600/mo guardrail cap.

- slug: summit-partners
  name: Summit Partners
  notes: >
    Project-based client. No standing retainer; each engagement is scoped and
    billed on its own, so cost attribution matters most here.
    Illustrative retainer tier: ~$500/mo guardrail cap.

- slug: kestrel-agency
  name: Kestrel Agency
  notes: >
    Retainer client with a tighter cap. Margin runs thin, so guardrails and
    per-client cost tracking keep the account healthy.
    Illustrative retainer tier: ~$450/mo guardrail cap.

- slug: riverstone-group
  name: Riverstone Group
  notes: >
    Smaller retainer, currently paused pending a renewed statement of work.
    Kept in the book so the pipeline and status digest surface the restart.
    Illustrative retainer tier: ~$200/mo guardrail cap.
