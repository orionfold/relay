id: relay-nonprofit--impact-reporting
name: Grant Compliance & Impact Reporting
description: >
  Gather grant outcomes, draft impact narratives, run a compliance check against
  each grant agreement, and assemble a funder-ready reporting package. The most
  gated workflow — narrative, compliance, and assembly each require approval.
version: "1.0.0"
domain: work
tags: [nonprofit, grant-compliance, impact-reporting, restricted-grants]
pattern: checkpoint
difficulty: advanced
estimatedDuration: "45-90 min"
author: Orionfold
variables:
  - id: client
    type: text
    label: Client
    required: true
    placeholder: Cornerstone Community Foundation
  - id: grants
    type: textarea
    label: Active restricted grants
    description: The grants this reporting cycle covers
    required: false
steps:
  - name: Gather grant outcomes
    profileId: relay-nonprofit--impact-writer
    requiresApproval: false
    promptTemplate: >
      For each active restricted grant for {{client}} ({{grants}}), collect the
      program metrics and spend-down. Map actuals to the agreement's stated
      outcomes and budget lines.
    expectedOutput: Outcome and spend-down data mapped to each grant's terms.
  - name: Draft impact narrative
    profileId: relay-nonprofit--impact-writer
    requiresApproval: true
    promptTemplate: >
      Write a per-grant impact narrative: what was funded, who was served, outcomes
      vs. targets, and a humanizing story. Tie every claim to the gathered data.
      Never expose PII.
    expectedOutput: A per-grant impact narrative, every claim sourced.
  - name: Compliance check
    profileId: relay-nonprofit--impact-writer
    requiresApproval: true
    promptTemplate: >
      Verify each report against its grant agreement: required metrics present,
      spending in allowed categories, correct reporting period, matching funds
      documented. Flag every gap before submission.
    expectedOutput: A compliance checklist with all gaps flagged.
  - name: Assemble reporting package
    profileId: relay-nonprofit--impact-writer
    requiresApproval: true
    promptTemplate: >
      Assemble a funder-ready package per grant plus a foundation-level
      annual-report summary for {{client}}. Stage it for program-officer review.
    expectedOutput: A funder-ready reporting package staged for review.
