id: relay-agency-pro
version: "0.2.0"
name: Relay Agency Pro
author: Orionfold
# This description renders as the what-you-get preview on the locked /packs
# card (D6) — it is sales copy, not an internal summary.
description: >
  Relay Agency runs a workflow. Agency Pro runs your agency. Six chapters of
  agency operating system: a Finance Cockpit that closes your month by itself
  (per-client rollups, margin on one screen, a scheduled month-end close);
  Intake Pipelines that turn a dropped row into the right client workflow
  automatically; a New-Business Machine that takes a prospect from research to
  signed engagement letter; client-safe Governance profiles with hard tool
  policies and a per-client audit export; a deep Commercial Real Estate
  renewal engine that covers critical dates, escalations, comps, LOI drafts,
  and portfolio rent roll; and the Nonprofit deep chapter (added in v0.2.0,
  your first included update), a grant pipeline that takes every opportunity from
  fit-scored go/no-go through LOI, full application, and post-award
  restricted-funds compliance with a reporting calendar. Everything installs
  offline; Relay never sends your data to Orionfold.
relayCore: ">=0.18.0"
entitlement: product:orionfold-relay
# Two-phase offer, hand-maintained to match orionfold.com/relay/ in this
# release. Reading the canonical Orionfold source to stay current is fine
# (the promise forbids SENDING user data, not reading public data — operator
# ruling 2026-07-02); until such a read ships, when the founding window
# closes on the Website, delete `intro` + `note` here in a normal release.
price:
  intro: "$349/year"
  list: "$499/year"
  note: "Founding price for early buyers. Locks in before it returns to list."
purchaseUrl: https://orionfold.com/relay/
icon: briefcase
# Per-version customer-voice recap — the single source every renewal surface
# reads (license status, the update refusal, the /packs card, the renewal
# email). Add a line here with EVERY version bump; the template test suite
# requires an entry for the current version.
changelog:
  "0.1.0": >-
    Six chapters of agency operating system: the Finance Cockpit that closes
    your month by itself, Intake Pipelines, the New-Business Machine,
    client-safe Governance profiles, and the Commercial Real Estate renewal
    engine.
  "0.2.0": >-
    The Nonprofit deep chapter, a grant pipeline that takes every opportunity
    from fit-scored go/no-go through LOI, full application, and post-award
    restricted-funds compliance with a reporting calendar.
customers: []
