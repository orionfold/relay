id: relay-agency-pro
version: "0.5.0"
name: Relay Agency Pro
author: Orionfold
# This description renders as the what-you-get preview on the locked /packs
# card (D6) — it is sales copy, not an internal summary.
description: >
  Agency Pro makes your client book run itself. It is the automation layer on
  top of the free Relay Agency pack:


  Finance Cockpit closes your month for you. See margin on one screen, with
  per-client rollups and a month-end close that runs on a schedule.


  Intake Pipelines turn a new row into the right client workflow on their own.


  New-Business Machine takes a prospect from first research to a signed
  engagement letter.


  Governance profiles keep each client safe with firm tool rules and an audit
  export you can hand over.


  Your industry delivery work lives in its own pack. Add Relay CRE or Relay
  Nonprofit for the lease, listing, grant, and impact workflows you deliver.


  Everything installs offline. Relay never sends your data to Orionfold.
relayCore: ">=0.18.0"
entitlement: product:orionfold-relay
# Two-phase offer, hand-maintained to match orionfold.com/relay/ in this
# release. Reading the canonical Orionfold source to stay current is fine
# (the promise forbids SENDING user data, not reading public data — operator
# ruling 2026-07-02); until such a read ships, when the founding window
# closes on the Website, delete `intro` + `note` here in a normal release.
price:
  intro: "$349/year"
  list: "$499/year"
  note: "Founding price for early buyers. Locks in before it returns to list."
purchaseUrl: https://orionfold.com/relay/
icon: briefcase
# Relationship copy: this paid pack builds ALONGSIDE the free Agency pack.
# It never replaces it, and the free workflows keep running after you install.
related:
  text: "Builds alongside the free Agency pack. Nothing is replaced, and your free workflows keep running."
  href: "/packs?filter=free"
# Per-version customer-voice recap — the single source every renewal surface
# reads (license status, the update refusal, the /packs card, the renewal
# email). Add a line here with EVERY version bump; the template test suite
# requires an entry for the current version.
changelog:
  "0.1.0": >-
    Six chapters of agency operating system: the Finance Cockpit that closes
    your month by itself, Intake Pipelines, the New-Business Machine,
    client-safe Governance profiles, and the Commercial Real Estate renewal
    engine.
  "0.2.0": >-
    The Nonprofit deep chapter, a grant pipeline that takes every opportunity
    from fit-scored go/no-go through LOI, full application, and post-award
    restricted-funds compliance with a reporting calendar.
  "0.3.0": >-
    A new home screen that shows all six workflows as cards you can run with
    one click. It tells you where to start, and each card shows its last run.
    No more hunting through menus to find what your app can do.
  "0.4.0": >-
    Your finance cockpit now arrives with a month of sample billing and cost
    entries, so you see real numbers the moment you install. Billed, costs, and
    margin light up right away instead of a blank ledger.
  "0.5.0": >-
    Agency Pro is now the automation layer for any agency, whatever work you do.
    The commercial real estate and nonprofit chapters moved to their own
    installable packs, Relay CRE and Relay Nonprofit, so you install exactly the
    delivery work you sell. Your finance cockpit, intake pipelines, new-business
    machine, and governance keep running and are now vertical-neutral.
customers: []
