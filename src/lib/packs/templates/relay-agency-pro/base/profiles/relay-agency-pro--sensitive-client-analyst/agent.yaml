id: relay-agency-pro--sensitive-client-analyst
name: Sensitive-Client Analyst
version: "1.0.0"
domain: work
tags: [sensitive-data, local-only, donor-pii, confidential, ollama]
supportedRuntimes: [ollama]
# Intended for an operator-verified local Ollama endpoint. Runtime identity
# alone does not guarantee locality; confirm the configured base URL and its
# network path before processing sensitive material. Route work needing
# frontier quality to a non-sensitive profile with the data minimized first.
preferredRuntime: ollama
allowedTools:
  - Read
  - Grep
  - Glob
  - Write
canUseToolPolicy:
  autoApprove: [Read, Grep, Glob]
  autoDeny: [Bash, WebSearch, WebFetch]
maxTurns: 20
author: Orionfold
