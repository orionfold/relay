id: relay-agency-pro--intake-pipeline
name: Intake Pipeline
description: >
  Fires automatically when a row lands in the intake table (row-insert trigger)
  and routes the work by service under the right client, then updates the row's
  status so the queue stays honest. If an industry pack is installed, its
  delivery workflows are the services this router hands work to.
version: "1.0.0"
domain: work
tags: [intake, routing, triggered, work-queue]
pattern: sequence
difficulty: beginner
estimatedDuration: "10-25 min"
author: Orionfold
# Fired by the row-insert trigger on the intake table: each variable defaults
# from the inserted row's columns.
variables:
  - id: client
    type: text
    label: Client
    description: The client this intake belongs to
    required: false
    default: "{{row.client}}"
  - id: service
    type: text
    label: Service
    description: "The service this request needs (a report, a campaign, a bookkeeping run, a new-business inquiry, or an industry-pack delivery workflow)"
    required: false
    default: "{{row.service}}"
  - id: source
    type: text
    label: Source
    description: Where the work arrived from
    required: false
    default: "{{row.source}}"
  - id: notes
    type: textarea
    label: Notes
    description: Anything attached to the intake row
    required: false
    default: "{{row.notes}}"
steps:
  - name: Route and execute the intake
    profileId: relay-agency-pro--intake-coordinator
    requiresApproval: false
    promptTemplate: >
      A new intake row arrived: client "{{client}}", service "{{service}}",
      source "{{source}}", notes: {{notes}}. Route it to the right work and do
      that work, do not just classify it: a bookkeeping/expense request →
      a normalized signed ledger-line proposal; a new-business inquiry →
      a prospect summary recommending the new-business blueprint; a request that
      names an installed industry-pack service → run that delivery workflow;
      anything else or an unknown client → needs-triage with a reason.
    expectedOutput: >
      The service-appropriate deliverable, produced under the correct client.
  - name: Update the queue
    profileId: relay-agency-pro--intake-coordinator
    requiresApproval: false
    promptTemplate: >
      Update the intake row for client "{{client}}" (service "{{service}}",
      source "{{source}}") using the injected table tools: set status to "done"
      if the work completed, or "needs-triage" with the reason in notes if it
      could not. Write a one-line summary of what was produced into the row's
      notes. The queue must reflect reality when you finish.
    expectedOutput: >
      The intake row's status and notes updated to match what actually happened.
