id: relay-agency-pro--grant-pipeline-deep
name: Grant Pipeline (Deep)
description: >
  Fires automatically when a grant opportunity lands in the grants table
  (row-insert trigger) and runs the full lifecycle discipline: extract the
  deadline chain, score the fit for a go/no-go, draft the application
  package for a go, and build the restricted-funds compliance calendar so
  an award never becomes unmanaged risk.
version: "1.0.0"
domain: work
tags: [nonprofit, grants, triggered, loi, compliance, restricted-funds]
pattern: checkpoint
difficulty: advanced
estimatedDuration: "45-90 min"
author: Orionfold
# Fired by the row-insert trigger on the grants table: each variable defaults
# from the inserted row's columns.
variables:
  - id: client
    type: text
    label: Client
    description: The nonprofit client this grant belongs to
    required: false
    default: "{{row.client}}"
  - id: funder
    type: text
    label: Funder
    description: Foundation, agency, or corporate funder
    required: false
    default: "{{row.funder}}"
  - id: program
    type: text
    label: Program
    description: The client program this funding would support
    required: false
    default: "{{row.program}}"
  - id: amount
    type: text
    label: Amount
    description: Award size sought or offered
    required: false
    default: "{{row.amount}}"
  - id: deadline
    type: text
    label: Deadline
    description: The next known deadline for this opportunity
    required: false
    default: "{{row.deadline}}"
  - id: notes
    type: textarea
    label: Notes
    description: Anything attached to the grant row (RFP link, contact, history)
    required: false
    default: "{{row.notes}}"
steps:
  - name: Extract the deadline chain
    profileId: relay-agency-pro--nonprofit-grants-analyst
    requiresApproval: false
    promptTemplate: >
      A new grant opportunity arrived for client "{{client}}": funder
      "{{funder}}", program "{{program}}", amount "{{amount}}", stated
      deadline "{{deadline}}", notes: {{notes}}. Extract the full deadline
      chain per your methodology — LOI deadline, full-proposal deadline,
      award date, program start, and any registration prerequisites — every
      date ABSOLUTE with its lead time from today and its source cited.
      Flag a chain that is already unwritable (insufficient lead time) as
      such.
    expectedOutput: >
      The absolute deadline chain with lead times, sources, and a
      writability flag.
  - name: Score the fit — go/no-go
    profileId: relay-agency-pro--nonprofit-grants-analyst
    requiresApproval: false
    promptTemplate: >
      Run your qualification scoring for "{{funder}}" → "{{client}}"
      ({{program}}, {{amount}}): the weighted fit score with all four
      components shown (alignment quoted funder-language against
      client-language, eligibility with any hard miss scoring it 0,
      capacity including match and reporting burden, economics with the
      all-in pursuit-plus-compliance cost). Close with go / no-go /
      conditional-go and the condition named.
    expectedOutput: >
      A scored go/no-go recommendation with the four components and the
      economics stated.
  - name: Draft the application package
    profileId: relay-agency-pro--nonprofit-grants-analyst
    requiresApproval: true
    promptTemplate: >
      For a GO on "{{funder}}" → "{{client}}": produce the requirements
      compliance checklist first (every required item, owner, internal
      deadline back-planned with the 3-day buffer), then draft the LOI (or
      the narrative skeleton if no LOI stage): need in the funder's
      framing, program design with its logic model and measurable targets,
      capacity, evaluation, sustainability, and the budget frame with
      restricted vs. unrestricted lines labeled. Every claim cited to
      client materials or marked [NEEDS CLIENT DATA]. For a NO-GO, write
      the one-paragraph decline rationale for the pipeline record instead.
    expectedOutput: >
      The compliance checklist plus the LOI/narrative draft (or the
      documented no-go rationale).
  - name: Build the compliance calendar
    profileId: relay-agency-pro--nonprofit-grants-analyst
    requiresApproval: false
    promptTemplate: >
      Assuming award (or for an already-awarded row), set up the
      restricted-funds compliance for "{{funder}}" → "{{client}}": abstract
      the award terms you have (amount vs. ask, period of performance,
      payment schedule with any reimbursement cash-flow gap, every
      restriction and prior-approval threshold), then produce the
      compliance calendar — interim/final reports, financial reports,
      match documentation, spend-down, records retention — every
      obligation an absolute date with lead time and owner. Update the
      grant row's stage and notes using the injected table tools so the
      pipeline reflects reality.
    expectedOutput: >
      The award abstraction and absolute-dated compliance calendar, with
      the grant row's stage updated.
